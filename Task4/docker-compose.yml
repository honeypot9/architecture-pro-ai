services:
  rag-bot:
    build: ./app/
    container_name: rag-bot
    ports:
      - "8080:8080"
    volumes:
      - ../../Task3/faiss_index:/app/faiss_index
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - YANDEX_API_KEY=${YANDEX_API_KEY}
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID}
    restart: unless-stopped
